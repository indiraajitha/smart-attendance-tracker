    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Start Recognition</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <style>
            :root {
                --primary-color: #00796B; /* Teal */
                --secondary-color: #004D40; /* Darker Teal */
                --accent-color: #ffc107; /* Amber/Yellow for highlights */
                --text-dark: #2c3e50; /* Dark Slate Gray */
                --text-medium: #555; /* Medium Gray */
                --text-light: #cfd8dc; /* Light Grayish Blue */
                --background-light: #f0f2f5; /* Light Gray Background */
                --background-white: #ffffff;
                --border-light: #e0e0e0; /* Slightly lighter border */
                --danger-color: #e74c3c; /* Red for logout/delete */
                --success-color: #28a745; /* Green for actions */
                --font-poppins: 'Poppins', sans-serif;
                --spacing-md: 20px;
            }

            body {
                font-family: var(--font-poppins);
                background-color: var(--background-light);
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                color: var(--text-dark);
            }

            .container {
                background-color: var(--background-white);
                padding: var(--spacing-md) 40px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                text-align: center;
                width: 100%;
                max-width: 450px;
            }

            h2 {
                color: var(--primary-color);
                margin-bottom: var(--spacing-md);
            }

            .flash-messages {
                list-style: none;
                padding: 0;
                margin-bottom: var(--spacing-md);
            }
            .flash-messages li {
                padding: 10px;
                margin-bottom: 8px;
                border-radius: 5px;
                font-size: 0.95em;
                font-weight: 500;
                border: 1px solid transparent;
            }
            .flash-messages .danger {
                background-color: #f8d7da;
                color: #721c24;
                border-color: #f5c6cb;
            }
            .flash-messages .info {
                background-color: #d1ecf1;
                color: #0c5460;
                border-color: #bee5eb;
            }

            .form-group {
                margin-bottom: var(--spacing-md);
                text-align: left;
            }

            label {
                display: block;
                margin-bottom: 8px;
                font-weight: 600;
                color: var(--text-dark);
            }

            input[type="text"] {
                width: calc(100% - 20px); /* Adjust for padding */
                padding: 10px;
                border: 1px solid var(--border-light);
                border-radius: 5px;
                font-size: 1em;
            }

            button {
                background-color: var(--primary-color);
                color: white;
                padding: 12px 25px;
                border: none;
                border-radius: 5px;
                font-size: 1.1em;
                font-weight: 600;
                cursor: pointer;
                transition: background-color 0.3s ease;
            }

            button:hover {
                background-color: var(--secondary-color);
            }

            .back-link {
                display: block;
                margin-top: 25px;
                color: var(--primary-color);
                text-decoration: none;
                font-weight: 600;
                transition: color 0.3s ease;
            }

            .back-link:hover {
                color: var(--secondary-color);
            }

            /* Responsive adjustments */
            @media (max-width: 600px) {
                .container {
                    padding: var(--spacing-md) 20px;
                    margin: 20px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Start Face Recognition</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="flash-messages">
                {% for category, message in messages %}
                    <li class="{{ category }}">{{ message }}</li>
                {% endfor %}
                </ul>
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('searchid') }}" method="post">
                <div class="form-group">
                    <label for="period_number">Period Number:</label>
                    <input type="text" id="period_number" name="period_number" required>
                </div>
                <div class="form-group">
                    <label for="subject_code">Subject Code:</label>
                    <input type="text" id="subject_code" name="subject_code" required>
                </div>
                <button type="submit">Start Recognition</button>
            </form>

            <a href="{{ url_for('AdminHome') }}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Admin Home</a>
        </div>
    </body>
    </html>
